<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Paw Palace - Pet Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- INTRO SCREEN -->
    <div id="intro-screen">
        <div class="intro-content">
            <h1>Paw Palace</h1>
            <p class="subtitle">Your Virtual Pet Mansion</p>
            <div class="breed-select">
                <h3>Choose Your Breed</h3>
                <div id="breed-grid" class="breed-grid"></div>
            </div>
            <div class="name-input">
                <label for="dog-name">Name Your Dog</label>
                <input type="text" id="dog-name" placeholder="Enter a name..." maxlength="16" autocomplete="off">
            </div>
            <button id="start-btn" class="btn-primary">Adopt & Play!</button>
        </div>
    </div>

    <!-- MAIN GAME -->
    <div id="game-screen" class="hidden">
        <canvas id="game-canvas"></canvas>

        <!-- HUD OVERLAY -->
        <div id="hud">
            <div id="hud-top">
                <div class="hud-left">
                    <span id="hud-name" class="hud-name">Buddy</span>
                    <span id="hud-level" class="hud-level">Lv 1</span>
                    <span id="hud-room" class="hud-room">Living Room</span>
                </div>
                <div class="hud-right">
                    <span class="hud-coins">🪙 <span id="hud-coins">50</span></span>
                    <button id="hud-switch" class="hud-btn" title="Switch Character (Tab)">🔄</button>
                </div>
            </div>
            <div id="hud-stats">
                <div class="hud-stat" title="Hunger"><span class="hs-icon">🍖</span><div class="hs-bar"><div id="hs-hunger" class="hs-fill" style="width:80%;background:#F59E0B"></div></div></div>
                <div class="hud-stat" title="Happiness"><span class="hs-icon">😊</span><div class="hs-bar"><div id="hs-happy" class="hs-fill" style="width:80%;background:#EC4899"></div></div></div>
                <div class="hud-stat" title="Energy"><span class="hs-icon">⚡</span><div class="hs-bar"><div id="hs-energy" class="hs-fill" style="width:80%;background:#3B82F6"></div></div></div>
                <div class="hud-stat" title="Hygiene"><span class="hs-icon">🫧</span><div class="hs-bar"><div id="hs-hygiene" class="hs-fill" style="width:80%;background:#06B6D4"></div></div></div>
                <div class="hud-stat" title="Health"><span class="hs-icon">❤️</span><div class="hs-bar"><div id="hs-health" class="hs-fill" style="width:100%;background:#22C55E"></div></div></div>
            </div>
            <div id="hud-xp"><div id="hud-xp-fill"></div></div>
        </div>

        <!-- INTERACTION PROMPT -->
        <div id="interact-prompt" class="hidden">
            <span id="interact-text">Press E to interact</span>
        </div>

        <!-- CONTROL INDICATOR -->
        <div id="control-indicator">
            <span id="control-icon">🧑</span>
            <span id="control-label">You</span>
        </div>

        <!-- BOTTOM BUTTONS -->
        <div id="bottom-bar">
            <button class="bb-btn" data-panel="shop" title="Shop">🛒</button>
            <button class="bb-btn" data-panel="wardrobe" title="Wardrobe">👔</button>
            <button class="bb-btn" data-panel="tricks" title="Tricks">⭐</button>
            <button class="bb-btn" data-panel="achievements" title="Achievements">🏆</button>
            <button class="bb-btn" data-panel="stats" title="Stats">📊</button>
            <button class="bb-btn" data-panel="map" title="Map">🗺️</button>
            <button class="bb-btn" id="photo-btn2" title="Photo">📷</button>
            <button class="bb-btn" id="music-btn2" title="Music">🎵</button>
        </div>

        <!-- INTERACTION RESULT POPUP -->
        <div id="result-popup" class="hidden">
            <div id="result-icon"></div>
            <div id="result-text"></div>
        </div>

        <!-- TOAST -->
        <div id="toast" class="toast hidden"></div>

        <!-- PANELS (overlays) -->
        <div id="panel-overlay" class="hidden">
            <div id="panel-box">
                <div id="panel-header">
                    <h3 id="panel-title"></h3>
                    <button id="panel-close">✕</button>
                </div>
                <div id="panel-body"></div>
            </div>
        </div>

        <!-- DAILY REWARD -->
        <div id="daily-reward" class="modal hidden">
            <div class="modal-content">
                <h3>🎁 Daily Reward!</h3>
                <p id="daily-reward-text"></p>
                <button class="btn-primary" id="claim-daily">Claim!</button>
            </div>
        </div>

        <!-- MOBILE CONTROLS -->
        <div id="mobile-controls">
            <div id="dpad">
                <button class="dpad-btn" data-dir="up">▲</button>
                <div class="dpad-mid">
                    <button class="dpad-btn" data-dir="left">◀</button>
                    <button class="dpad-btn dpad-center" data-dir="interact">E</button>
                    <button class="dpad-btn" data-dir="right">▶</button>
                </div>
                <button class="dpad-btn" data-dir="down">▼</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
